<!DOCTYPE html>
<html>
<head>
    <title>AI CDSS</title>
</head>
<body>

<h2>Diabetes Prediction System</h2>

<form action="/predict" method="post">

    Pregnancies: <input type="text" name="Pregnancies"><br><br>
    Glucose: <input type="text" name="Glucose"><br><br>
    Blood Pressure: <input type="text" name="BloodPressure"><br><br>
    Skin Thickness: <input type="text" name="SkinThickness"><br><br>
    Insulin: <input type="text" name="Insulin"><br><br>
    BMI: <input type="text" name="BMI"><br><br>
    Diabetes Pedigree Function: <input type="text" name="DiabetesPedigreeFunction"><br><br>
    Age: <input type="text" name="Age"><br><br>

    <input type="submit" value="Predict">

</form>

<h3>{{ prediction_text }}</h3>

</body>
</html>
